<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Manager</title>

<link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css' rel='stylesheet' />
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>

<style>

body {
    margin:0;
    font-family:Arial, sans-serif;
    background:#0f172a;
    color:white;
}

/* HEADER */
.header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px;
    background:#020617;
}

.header a {
    color:white;
    text-decoration:none;
    margin-left:10px;
}

/* BUTTON */
button {
    padding:8px 12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.btn-green { background:#22c55e; color:white; }
.btn-red { background:#ef4444; color:white; }
.btn-blue { background:#3b82f6; color:white; }

/* FORM */
.filters {
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    padding:15px;
}

/* CALENDAR */
#calendar {
    background:white;
    color:black;
    padding:10px;
    border-radius:10px;
    margin:15px;
}

/* CARDS */
.card {
    background:#1f2937;
    padding:12px;
    border-radius:10px;
    margin:10px;
}

/* MODAL */
.modal {
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    justify-content:center;
    align-items:center;
}

.modal-content {
    background:white;
    color:black;
    padding:20px;
    border-radius:10px;
    width:300px;
}

/* MOBILE */
@media(max-width:768px){
    .filters{
        flex-direction:column;
    }
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <h2>👔 Dashboard Manager</h2>

    <div>
        <a href="/switch_view/worker">👷 Worker</a>
        <a href="/settings">⚙️ Settings</a>
        <a href="/logout">🚪 Logout</a>
    </div>
</div>

<!-- EXPORT -->
<form class="filters" method="GET" action="/export_excel">
    <div>
        Dal:<br>
        <input type="date" name="date_from" required>
    </div>

    <div>
        Al:<br>
        <input type="date" name="date_to" required>
    </div>

    <button class="btn-green">📥 Excel</button>
</form>

<!-- CALENDAR -->
<div id="calendar"></div>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-content">
        <div id="modalBody"></div>
        <br>
        <button class="btn-green" onclick="approve()">✔ Approva</button>
        <button class="btn-red" onclick="reject()">✖ Rifiuta</button>
        <button onclick="closeModal()">Chiudi</button>
    </div>
</div>

<!-- LISTA -->
<h3 style="padding-left:15px;">Richieste</h3>

{% for d in data %}
<div class="card">

    <b>{{ d.worker_name }}</b><br>
    {{ d.type }}<br>
    {{ d.date_from }} → {{ d.date_to }}<br>

    Stato:
    <span style="
        color:
        {% if d.status == 'pending' %}#f59e0b
        {% elif d.status == 'approved' %}#22c55e
        {% else %}#ef4444
        {% endif %}
    ">
        {{ d.status }}
    </span>

    <br><br>

    <button class="btn-green" onclick="quickApprove('{{d.id}}')">✔</button>
    <button class="btn-red" onclick="quickReject('{{d.id}}')">✖</button>

</div>
{% endfor %}

<!-- JS -->
<script>

let currentId = null;

document.addEventListener('DOMContentLoaded', function() {

    var calendar = new FullCalendar.Calendar(
        document.getElementById('calendar'),
        {
            initialView: 'dayGridMonth',
            locale: 'it',
            firstDay:1,

            events: {{ events|safe }},

            eventClick: function(info){

                let e = info.event;
                currentId = e.id;

                let html = `
                    <b>${e.extendedProps.worker_name || ''}</b><br>
                    Tipo: ${e.extendedProps.type}<br>
                    Data: ${e.extendedProps.date_from}
                `;

                document.getElementById("modalBody").innerHTML = html;
                document.getElementById("modal").style.display = "flex";
            }
        }
    );

    calendar.render();
});

function closeModal(){
    document.getElementById("modal").style.display = "none";
}

function approve(){
    fetch("/approve/" + currentId)
        .then(()=>location.reload());
}

function reject(){
    fetch("/reject/" + currentId)
        .then(()=>location.reload());
}

function quickApprove(id){
    fetch("/approve/" + id).then(()=>location.reload());
}

function quickReject(id){
    fetch("/reject/" + id).then(()=>location.reload());
}

</script>

</body>
</html>
