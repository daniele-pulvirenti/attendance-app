<!DOCTYPE html>
<html lang="it">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.card {
    background:#1e293b;
    padding:25px;
    border-radius:10px;
    width:320px;
}

input {
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:6px;
    border:none;
}

button {
    width:100%;
    padding:10px;
    background:#22c55e;
    border:none;
    border-radius:6px;
    color:white;
}
</style>
</head>

<body>

<div class="card">

<h2>Nuova password</h2>

<form method="POST">
<input type="password" name="password" placeholder="Nuova password" required>
<button>Reset Password</button>
</form>

</div>

</body>
</html>
